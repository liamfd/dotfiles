# Mouse support (scroll, click panes, resize)
set -g mouse on

# Slower scroll (1 line at a time)
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down

# Fix ESC delay in vim
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows/panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Alt + arrow to switch panes (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Better colors
set -g default-terminal "tmux-256color"

# Status bar: show path and git branch on the right
set -g status-interval 5
set -g status-left ''
set -g status-right-length 100
set -g status-right '#(cd "#{pane_current_path}"; pwd | sed "s|$HOME|~|") | #(cd "#{pane_current_path}"; git branch --show-current 2>/dev/null || echo "no-branch") '
